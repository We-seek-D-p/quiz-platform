server {
    listen 8080;
    server_name _;
    resolver 127.0.0.11 ipv6=off valid=30s;

    location /api/v1/auth/ {
        set $auth_upstream http://auth:8000;
        proxy_pass $auth_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /_auth/validate {
        internal;
        set $auth_header $http_authorization;
        if ($auth_header = "") {
            set $auth_header "Bearer $ws_access_token";
        }
        set $auth_validate_upstream http://auth:8000/api/v1/auth/validate;
        proxy_pass $auth_validate_upstream;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Authorization $auth_header;
        proxy_set_header X-Original-URI $request_uri;
    }

    location /api/v1/quizzes {
        auth_request /_auth/validate;
        auth_request_set $auth_user_id $upstream_http_x_user_id;
        auth_request_set $auth_user_role $upstream_http_x_user_role;

        set $management_upstream http://management:8000;
        proxy_pass $management_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-User-Id $auth_user_id;
        proxy_set_header X-User-Role $auth_user_role;
    }

    location /api/v1/sessions {
        auth_request /_auth/validate;
        auth_request_set $auth_user_id $upstream_http_x_user_id;
        auth_request_set $auth_user_role $upstream_http_x_user_role;

        set $management_sessions_upstream http://management:8000;
        proxy_pass $management_sessions_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-User-Id $auth_user_id;
        proxy_set_header X-User-Role $auth_user_role;
    }

    location /api/v1/ws/host {
        set $ws_access_token $arg_access_token;
        auth_request /_auth/validate;
        auth_request_set $auth_user_id $upstream_http_x_user_id;
        auth_request_set $auth_user_role $upstream_http_x_user_role;

        set $session_host_upstream http://session:8000;
        proxy_pass $session_host_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-User-ID $auth_user_id;
        proxy_set_header X-User-Role $auth_user_role;
    }

    location /api/v1/ws/player {
        set $session_player_upstream http://session:8000;
        proxy_pass $session_player_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        set $frontend_upstream http://frontend:8080;
        proxy_pass $frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
