services:
  db:
    image: postgres:18
    container_name: quiz-auth-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-quiz_auth}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quiz_auth}
      POSTGRES_DB: ${POSTGRES_DB:-quiz_auth}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-quiz_auth}"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    container_name: quiz-auth-app
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8000:8000"

volumes:
  pg_data:
