services:
  db:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - quiz_pg_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  auth:
    build:
      context: ./apps/auth
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('127.0.0.1', 8000), 2); s.close()"]
      interval: 5s
      timeout: 3s
      retries: 20

  management:
    build:
      context: ./apps/management
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('127.0.0.1', 8000), 2); s.close()"]
      interval: 5s
      timeout: 3s
      retries: 20

  session:
    build:
      context: ./apps/session
      dockerfile: Dockerfile
    depends_on:
      management:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    expose:
      - "8000"

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "deno", "eval", "await fetch('http://127.0.0.1:8080')"]
      interval: 5s
      timeout: 3s
      retries: 20

  nginx:
    build:
      context: ./infra/nginx
      dockerfile: Dockerfile
    depends_on:
      frontend:
        condition: service_healthy
      auth:
        condition: service_healthy
      management:
        condition: service_healthy
      session:
        condition: service_started
    ports:
      - "${NGINX_APP_PORT:-8080}:8080"

volumes:
  quiz_pg_data:
