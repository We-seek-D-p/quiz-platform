name: Deploy production

on:
  workflow_run:
    workflows:
      - Python CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-prod-main
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    name: Build and push / ${{ matrix.image }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: quiz-auth
            context: ./apps/auth
            dockerfile: ./apps/auth/Dockerfile
            cache_scope: auth

          - image: quiz-management
            context: ./apps/management
            dockerfile: ./apps/management/Dockerfile
            cache_scope: management

          - image: quiz-frontend
            context: ./apps/frontend
            dockerfile: ./apps/frontend/Dockerfile
            cache_scope: frontend

          - image: quiz-nginx
            context: ./infra/nginx
            dockerfile: ./infra/nginx/Dockerfile
            cache_scope: nginx

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ vars.GHCR_OWNER }}/${{ matrix.image }}:main
            ghcr.io/${{ vars.GHCR_OWNER }}/${{ matrix.image }}:sha-${{ github.event.workflow_run.head_sha || github.sha }}
          labels: |
            org.opencontainers.image.title=${{ matrix.image }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.event.workflow_run.head_sha || github.sha }}
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache_scope }}

  deploy:
    name: Trigger Dokploy deploy
    needs: build-and-push
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Dokploy compose deploy
        env:
          DOKPLOY_URL: ${{ vars.DOKPLOY_URL }}
          DOKPLOY_COMPOSE_ID: ${{ vars.DOKPLOY_COMPOSE_ID }}
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
        run: |
          curl --fail --show-error --silent \
            -X POST "${DOKPLOY_URL}/api/compose.deploy" \
            -H "accept: application/json" \
            -H "content-type: application/json" \
            -H "x-api-key: ${DOKPLOY_API_KEY}" \
            -d "{\"composeId\":\"${DOKPLOY_COMPOSE_ID}\"}"
