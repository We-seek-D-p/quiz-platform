name: Deploy production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build images and deploy to Dokploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      packages: write

    concurrency:
      group: deploy-prod-main
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare vars
        id: prep
        shell: bash
        run: |
          set -euo pipefail
          echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          echo "sha_short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push auth
        uses: docker/build-push-action@v7
        with:
          context: ./apps/auth
          file: ./apps/auth/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.prep.outputs.owner_lc }}/quiz-auth:main
            ghcr.io/${{ steps.prep.outputs.owner_lc }}/quiz-auth:sha-${{ steps.prep.outputs.sha_short }}
          labels: |
            org.opencontainers.image.title=quiz-auth
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=auth
          cache-to: type=gha,mode=max,scope=auth

      - name: Build and push management
        uses: docker/build-push-action@v7
        with:
          context: ./apps/management
          file: ./apps/management/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.prep.outputs.owner_lc }}/quiz-management:main
            ghcr.io/${{ steps.prep.outputs.owner_lc }}/quiz-management:sha-${{ steps.prep.outputs.sha_short }}
          labels: |
            org.opencontainers.image.title=quiz-management
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=management
          cache-to: type=gha,mode=max,scope=management

      - name: Build and push frontend
        uses: docker/build-push-action@v7
        with:
          context: ./apps/frontend
          file: ./apps/frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.prep.outputs.owner_lc }}/quiz-frontend:main
            ghcr.io/${{ steps.prep.outputs.owner_lc }}/quiz-frontend:sha-${{ steps.prep.outputs.sha_short }}
          labels: |
            org.opencontainers.image.title=quiz-frontend
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Build and push nginx
        uses: docker/build-push-action@v7
        with:
          context: ./infra/nginx
          file: ./infra/nginx/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.prep.outputs.owner_lc }}/quiz-nginx:main
            ghcr.io/${{ steps.prep.outputs.owner_lc }}/quiz-nginx:sha-${{ steps.prep.outputs.sha_short }}
          labels: |
            org.opencontainers.image.title=quiz-nginx
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=nginx
          cache-to: type=gha,mode=max,scope=nginx

      - name: Trigger Dokploy compose deploy
        shell: bash
        env:
          DOKPLOY_URL: ${{ vars.DOKPLOY_URL }}
          DOKPLOY_COMPOSE_ID: ${{ vars.DOKPLOY_COMPOSE_ID }}
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
        run: |
          set -euo pipefail

          : "${DOKPLOY_URL:?DOKPLOY_URL is required}"
          : "${DOKPLOY_COMPOSE_ID:?DOKPLOY_COMPOSE_ID is required}"
          : "${DOKPLOY_API_KEY:?DOKPLOY_API_KEY is required}"

          curl --fail --show-error --silent \
            -X POST "${DOKPLOY_URL}/api/compose.deploy" \
            -H "accept: application/json" \
            -H "content-type: application/json" \
            -H "x-api-key: ${DOKPLOY_API_KEY}" \
            -d "{\"composeId\":\"${DOKPLOY_COMPOSE_ID}\"}"
