name: Go CI

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - main

concurrency:
  group: go-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    name: ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: session
            path: apps/session

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: ${{ matrix.path }}/go.sum

      - name: Install dependencies
        working-directory: ${{ matrix.path }}
        run: go mod download

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          working-directory: ${{ matrix.path }}
          args: --timeout=5m

      - name: Test
        working-directory: ${{ matrix.path }}
        run: go test -v -race ./...
