name: Frontend CI

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - main

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    name: frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: apps/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: deno install --frozen

      - name: Prepare Nuxt
        run: deno task postinstall

      - name: Check formatting
        run: deno fmt --check

      - name: Lint
        run: deno lint && deno run -A npm:eslint .

      - name: Build
        run: deno task build
