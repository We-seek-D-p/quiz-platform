services:
  auth:
    image: ghcr.io/${GHCR_OWNER}/quiz-auth:main
    pull_policy: always
    environment:
      AUTH_APP_NAME: ${AUTH_APP_NAME}
      AUTH_APP_PORT: ${AUTH_APP_PORT}
      AUTH_DEBUG: ${AUTH_DEBUG}
      AUTH_DATABASE_URL: ${AUTH_DATABASE_URL}
      AUTH_JWT_SECRET_KEY: ${AUTH_JWT_SECRET_KEY}
      AUTH_JWT_ALGORITHM: ${AUTH_JWT_ALGORITHM}
      AUTH_ACCESS_TOKEN_TTL_MINUTES: ${AUTH_ACCESS_TOKEN_TTL_MINUTES}
      AUTH_REFRESH_TOKEN_TTL_DAYS: ${AUTH_REFRESH_TOKEN_TTL_DAYS}
      AUTH_REFRESH_COOKIE_SECURE: ${AUTH_REFRESH_COOKIE_SECURE}
    expose:
      - "8000"
    networks:
      - dokploy-network

  management:
    image: ghcr.io/${GHCR_OWNER}/quiz-management:main
    pull_policy: always
    environment:
      MANAGEMENT_APP_NAME: ${MANAGEMENT_APP_NAME}
      MANAGEMENT_APP_PORT: ${MANAGEMENT_APP_PORT}
      MANAGEMENT_DEBUG: ${MANAGEMENT_DEBUG}
      MANAGEMENT_DATABASE_URL: ${MANAGEMENT_DATABASE_URL}
      MANAGEMENT_INTERNAL_SERVICE_NAME: ${MANAGEMENT_INTERNAL_SERVICE_NAME}
      MANAGEMENT_INTERNAL_ALLOWED_SERVICES: ${MANAGEMENT_INTERNAL_ALLOWED_SERVICES}
      MANAGEMENT_INTERNAL_TOKEN: ${MANAGEMENT_INTERNAL_TOKEN}
    expose:
      - "8000"
    networks:
      - dokploy-network

  session:
    image: ghcr.io/${GHCR_OWNER}/quiz-session:main
    pull_policy: always
    environment:
      SESSION_APP_NAME: ${SESSION_APP_NAME}
      SESSION_APP_PORT: ${SESSION_APP_PORT}
      SESSION_LOG_LEVEL: ${SESSION_LOG_LEVEL}
      SESSION_LOG_FORMAT: ${SESSION_LOG_FORMAT}
      SESSION_REDIS_ADDR: ${SESSION_REDIS_ADDR}
      SESSION_REDIS_PASSWORD: ${SESSION_REDIS_PASSWORD}
      SESSION_REDIS_DB: ${SESSION_REDIS_DB}
      SESSION_INTERNAL_SERVICE_NAME: ${SESSION_INTERNAL_SERVICE_NAME}
      SESSION_INTERNAL_ALLOWED_SERVICES: ${SESSION_INTERNAL_ALLOWED_SERVICES}
      SESSION_INTERNAL_TOKEN: ${SESSION_INTERNAL_TOKEN}
      SESSION_MANAGEMENT_BASE_URL: ${SESSION_MANAGEMENT_BASE_URL}
      SESSION_MANAGEMENT_TIMEOUT_SECONDS: ${SESSION_MANAGEMENT_TIMEOUT_SECONDS}
      SESSION_WS_READ_LIMIT_BYTES: ${SESSION_WS_READ_LIMIT_BYTES}
      SESSION_GAME_REVEAL_DURATION_SECONDS: ${SESSION_GAME_REVEAL_DURATION_SECONDS}
    expose:
      - "8000"
    networks:
      - dokploy-network

  frontend:
    image: ghcr.io/${GHCR_OWNER}/quiz-frontend:main
    pull_policy: always
    expose:
      - "8080"
    networks:
      - dokploy-network

  nginx:
    image: ghcr.io/${GHCR_OWNER}/quiz-nginx:main
    pull_policy: always
    depends_on:
      - auth
      - management
      - session
      - frontend
    expose:
      - "8080"
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
